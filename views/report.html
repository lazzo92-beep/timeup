<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://p.trellocdn.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.trello.com https://trello.com; img-src 'self' data: https:; font-src 'self' data:;" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>TimeUp - Time Report</title>
    <link rel="stylesheet" href="./styles/report.css" />
  </head>
  <body>
    <main class="report-shell">
      <header class="report-header">
        <div>
          <h1>Time Report</h1>
          <p id="board-name">Loading board data...</p>
        </div>
        <div class="report-actions">
          <label>
            From
            <input id="date-from" type="date" />
          </label>
          <label>
            To
            <input id="date-to" type="date" />
          </label>
          <button id="refresh" type="button">Refresh</button>
          <button id="export-csv" type="button" disabled>Export CSV</button>
        </div>
      </header>

      <section class="summary-grid" aria-label="Report summary">
        <div class="summary-item">
          <span class="summary-label">Cards with time</span>
          <strong id="summary-cards">0</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">Tracked time</span>
          <strong id="summary-time">0m</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">Estimated</span>
          <strong id="summary-estimate">0m</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">Delta</span>
          <strong id="summary-delta">0m</strong>
        </div>
      </section>

      <section class="table-section">
        <div id="status" class="status">Loading cards...</div>
        <table class="report-table" aria-label="Tracked time by card">
          <thead>
            <tr>
              <th>Card</th>
              <th>List</th>
              <th class="number">Tracked</th>
              <th class="number">Estimate</th>
              <th class="number">Delta</th>
              <th class="number">Entries</th>
            </tr>
          </thead>
          <tbody id="report-rows"></tbody>
        </table>
      </section>

      <section class="table-section detail-section">
        <div class="section-heading">
          <h2>Work Log</h2>
          <span id="range-label">All dated entries</span>
        </div>
        <table class="report-table" aria-label="Tracked time entries">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Card</th>
              <th>List</th>
              <th>Description</th>
              <th class="number">Tracked</th>
            </tr>
          </thead>
          <tbody id="entry-rows"></tbody>
        </table>
      </section>

    </main>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script type="module">
      import { AppConfig } from "../src/config/AppConfig.js";
      const t = TrelloPowerUp.iframe({
        appKey: AppConfig.APP_KEY,
        appName: AppConfig.APP_NAME,
      });

      const elements = {
        boardName: document.getElementById("board-name"),
        rangeLabel: document.getElementById("range-label"),
        status: document.getElementById("status"),
        rows: document.getElementById("report-rows"),
        entryRows: document.getElementById("entry-rows"),
        dateFrom: document.getElementById("date-from"),
        dateTo: document.getElementById("date-to"),
        refresh: document.getElementById("refresh"),
        exportCsv: document.getElementById("export-csv"),
        summaryCards: document.getElementById("summary-cards"),
        summaryTime: document.getElementById("summary-time"),
        summaryEstimate: document.getElementById("summary-estimate"),
        summaryDelta: document.getElementById("summary-delta"),
      };

      let reportRows = [];
      let reportEntries = [];
      let currentRange = { isActive: false };

      const escapeHtml = (value) =>
        String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");

      const formatReportDuration = (ms) => {
        const safeMs = Math.max(0, Number(ms) || 0);
        const totalMinutes = Math.floor(safeMs / (60 * 1000));
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
      };

      const formatDecimalHours = (ms) => {
        const hours = Math.max(0, Number(ms) || 0) / (60 * 60 * 1000);
        return Number(hours.toFixed(4)).toString();
      };

      const formatSignedDuration = (ms) => {
        if (!ms) return "0m";
        const sign = ms > 0 ? "+" : "-";
        return `${sign}${formatReportDuration(Math.abs(ms))}`;
      };

      const formatDate = (timestamp) => {
        if (!timestamp) return "";
        const date = new Date(timestamp);
        if (isNaN(date.getTime())) return "";
        return date.toLocaleDateString(undefined, {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        });
      };

      const formatTime = (timestamp) => {
        if (!timestamp) return "";
        const date = new Date(timestamp);
        if (isNaN(date.getTime())) return "";
        return date.toLocaleTimeString(undefined, {
          hour: "2-digit",
          minute: "2-digit",
        });
      };

      const formatEntryTimeRange = (entry) => {
        if (!entry.startTime && !entry.endTime) return "";
        const start = formatTime(entry.startTime);
        const end = formatTime(entry.endTime);
        return start && end ? `${start} - ${end}` : start || end;
      };

      const formatRangeLabel = (range) => {
        if (!range?.isActive) return "All dated entries";
        const from = elements.dateFrom.value || "start";
        const to = elements.dateTo.value || "today";
        return `${from} to ${to}`;
      };

      const buildListNameMap = async () => {
        const lists = await t.lists("id", "name");
        return new Map((lists || []).map((list) => [list.id, list.name]));
      };

      const getDateRange = () => {
        const from = elements.dateFrom.value
          ? new Date(`${elements.dateFrom.value}T00:00:00`).getTime()
          : null;
        const to = elements.dateTo.value
          ? new Date(`${elements.dateTo.value}T23:59:59.999`).getTime()
          : null;

        return {
          from: Number.isFinite(from) ? from : null,
          to: Number.isFinite(to) ? to : null,
          isActive: Number.isFinite(from) || Number.isFinite(to),
        };
      };

      const isEntryInRange = (entry, range) => {
        const timestamp = Number(entry?.startTime || entry?.createdAt || 0);
        if (!timestamp) return false;
        if (range.from !== null && timestamp < range.from) return false;
        if (range.to !== null && timestamp > range.to) return false;
        return true;
      };

      const getReportEntries = (timerData, range) => {
        const entries = Array.isArray(timerData?.recentEntries)
          ? timerData.recentEntries
          : [];
        return range.isActive
          ? entries.filter((entry) => isEntryInRange(entry, range))
          : entries;
      };

      const readCardTimerData = async (cardId) => {
        try {
          return await t.get(cardId, "shared", "timerData", null);
        } catch (error) {
          return null;
        }
      };

      const buildReport = async () => {
        elements.status.textContent = "Loading cards...";
        elements.refresh.disabled = true;
        elements.exportCsv.disabled = true;
        elements.rows.innerHTML = "";

        try {
          const range = getDateRange();
          const [board, cards, listNames] = await Promise.all([
            t.board("name"),
            t.cards("id", "name", "url", "idList"),
            buildListNameMap(),
          ]);

          elements.boardName.textContent = board?.name || "Current board";

          const rows = [];
          const entryRows = [];
          for (const card of cards || []) {
            const timerData = await readCardTimerData(card.id);
            const cardEntries = getReportEntries(timerData, range);
            const totalTime = range.isActive
              ? cardEntries.reduce(
                  (sum, entry) => sum + Number(entry?.duration || 0),
                  0,
                )
              : Number(timerData?.totalTime || 0);
            const estimatedTime = range.isActive
              ? 0
              : Number(timerData?.estimatedTime || 0);
            const checklistTotals = Object.values(
              timerData?.checklistTotals || {},
            );
            const checklistEntries = range.isActive
              ? 0
              : checklistTotals.reduce(
                  (sum, item) => sum + Number(item?.entryCount || 0),
                  0,
                );
            const recentEntries = cardEntries.length;

            if (totalTime <= 0 && estimatedTime <= 0) continue;

            for (const entry of cardEntries) {
              entryRows.push({
                cardName: card.name,
                cardUrl: card.url,
                listName: listNames.get(card.idList) || "",
                startTime: Number(entry?.startTime || entry?.createdAt || 0),
                endTime: Number(entry?.endTime || 0),
                duration: Number(entry?.duration || 0),
                description: entry?.description || "",
              });
            }

            if (!range.isActive && totalTime > 0 && !cardEntries.length) {
              entryRows.push({
                cardName: card.name,
                cardUrl: card.url,
                listName: listNames.get(card.idList) || "",
                startTime: null,
                endTime: null,
                duration: totalTime,
                description: "Aggregate total (no dated entries)",
              });
            }

            rows.push({
              cardName: card.name,
              cardUrl: card.url,
              listName: listNames.get(card.idList) || "",
              totalTime,
              estimatedTime,
              delta: range.isActive ? 0 : totalTime - estimatedTime,
              entryCount: Math.max(recentEntries, checklistEntries),
            });
          }

          rows.sort((a, b) => b.totalTime - a.totalTime);
          entryRows.sort(
            (a, b) => (a.startTime || 0) - (b.startTime || 0),
          );
          reportRows = rows;
          reportEntries = entryRows;
          currentRange = range;
          renderReport(rows, entryRows, range);
        } catch (error) {
          elements.status.textContent = "Could not load report data.";
        } finally {
          elements.refresh.disabled = false;
        }
      };

      const renderReport = (
        rows,
        entryRows,
        range = { isActive: false },
      ) => {
        const totalTime = rows.reduce((sum, row) => sum + row.totalTime, 0);
        const totalEstimate = rows.reduce(
          (sum, row) => sum + row.estimatedTime,
          0,
        );

        elements.summaryCards.textContent = rows.length;
        elements.summaryTime.textContent = formatReportDuration(totalTime);
        elements.summaryEstimate.textContent = range.isActive
          ? "n/a"
          : formatReportDuration(totalEstimate);
        elements.summaryDelta.textContent = range.isActive
          ? "n/a"
          : formatSignedDuration(totalTime - totalEstimate);
        elements.rangeLabel.textContent = formatRangeLabel(range);

        if (!rows.length) {
          elements.status.textContent = range.isActive
            ? "No dated entries found in this range. Older aggregate totals cannot be split by date."
            : "No tracked time found on visible cards.";
          elements.rows.innerHTML = "";
          elements.entryRows.innerHTML = "";
          return;
        }

        elements.status.textContent = range.isActive
          ? "Range report uses dated recent/manual entries only."
          : "";
        elements.exportCsv.disabled = false;
        elements.rows.innerHTML = rows
          .map(
            (row) => `
              <tr>
                <td>
                  <a href="${escapeHtml(row.cardUrl)}" target="_blank" rel="noreferrer">${escapeHtml(row.cardName)}</a>
                </td>
                <td>${escapeHtml(row.listName)}</td>
                <td class="number">${escapeHtml(formatReportDuration(row.totalTime))}</td>
                <td class="number">${range.isActive ? "n/a" : escapeHtml(formatReportDuration(row.estimatedTime))}</td>
                <td class="number ${row.delta > 0 ? "over" : "under"}">${range.isActive ? "n/a" : escapeHtml(formatSignedDuration(row.delta))}</td>
                <td class="number">${escapeHtml(row.entryCount)}</td>
              </tr>
            `,
          )
          .join("");

        elements.entryRows.innerHTML = entryRows.length
          ? entryRows
              .map(
                (entry) => `
                  <tr>
                    <td>${escapeHtml(formatDate(entry.startTime))}</td>
                    <td>${escapeHtml(formatEntryTimeRange(entry))}</td>
                    <td>
                      <a href="${escapeHtml(entry.cardUrl)}" target="_blank" rel="noreferrer">${escapeHtml(entry.cardName)}</a>
                    </td>
                    <td>${escapeHtml(entry.listName)}</td>
                    <td>${escapeHtml(entry.description)}</td>
                    <td class="number">${escapeHtml(formatReportDuration(entry.duration))}</td>
                  </tr>
                `,
              )
              .join("")
          : `<tr><td colspan="6">No dated entries available for this report.</td></tr>`;
      };

      const csvValue = (value) => `"${String(value ?? "").replace(/"/g, '""')}"`;

      const exportCsv = () => {
        const header = [
          "Report period",
          "Date",
          "Time",
          "Card name",
          "List",
          "Tracked hours",
          "Description",
        ];
        const lines = [
          header.map(csvValue).join(","),
          ...reportEntries.map((entry) =>
            [
              formatRangeLabel(currentRange),
              formatDate(entry.startTime),
              formatEntryTimeRange(entry),
              entry.cardName,
              entry.listName,
              formatDecimalHours(entry.duration),
              entry.description,
            ]
              .map(csvValue)
              .join(","),
          ),
        ];

        const blob = new Blob([lines.join("\n")], {
          type: "text/csv;charset=utf-8",
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `timeup-report-${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      };

      elements.refresh.addEventListener("click", buildReport);
      elements.exportCsv.addEventListener("click", exportCsv);
      elements.dateFrom.addEventListener("change", buildReport);
      elements.dateTo.addEventListener("change", buildReport);

      t.render(buildReport);
    </script>
  </body>
</html>
